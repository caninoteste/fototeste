<script>
function carregarFotos(){

    let url="https://docs.google.com/spreadsheets/d/e/2PACX-1vQl28B_dLz0aAl2rIvZvue6LLMoWgwhWdwlkS9knj1peYlLq3U_C3f0zi36bzyWFUo-_E7njQSWLXxI/pub?gid=670100109&single=true&output=csv"

    fetch(url)
    .then(res => res.text())
    .then(data => {
        let linhas = data.split("\n").slice(1) // pular cabeçalho
        let galeria = document.getElementById("galeria")
        galeria.innerHTML = ""

        linhas.forEach(linha => {
            let col = linha.split(",")
            let numero = col[0].trim()
            let foto = col[1].trim()

            if(!foto) return

            let div = document.createElement("div")
            div.className = "foto"
            div.innerHTML = `
                <img src="${foto}">
                <p>Foto ${numero}</p>
                <button>Adicionar ao carrinho</button>
            `
            galeria.appendChild(div)
        })
    })
}
</script>
